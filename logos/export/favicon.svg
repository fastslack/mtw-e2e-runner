<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- E2E Runner favicon — "E²" monogram, Test Operations Center palette -->
  <rect width="512" height="512" rx="96" fill="#0b0c09"/>
  <rect x="20" y="20" width="472" height="472" rx="76" fill="none" stroke="#33342a" stroke-width="4"/>
  <!-- phosphor spine accent, top-left -->
  <rect x="44" y="60" width="6" height="116" rx="3" fill="#a8f57a"/>
  <!-- bold block E -->
  <g id="E" fill="#f3eddc">
    <rect x="132" y="150" width="66" height="250" rx="9"/>
    <rect x="132" y="150" width="214" height="66" rx="9"/>
    <rect x="132" y="272" width="172" height="58" rx="9"/>
    <rect x="132" y="334" width="214" height="66" rx="9"/>
  </g>
  <!-- superscript "2" -->
  <path id="two" d="M 356 150 C 356 104 456 104 456 152 C 456 190 388 206 360 232 L 460 232"
        fill="none" stroke="#a8f57a" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- status / scan bar -->
  <rect id="status-bar" x="132" y="424" width="300" height="16" rx="8" fill="#a8f57a"/>
